name: 'Update Dependencies'

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

env:
  GOPROXY: https://proxy.golang.org

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout hydrophone
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: '1.24.2'

      - name: Update Dependencies
        id: update_deps
        run: |
          hack/bump-k8s.sh
          echo 'changes<<EOF' >> $GITHUB_OUTPUT
          git status --porcelain >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Create PR
        if: ${{ steps.update_deps.outputs.changes != '' }}
        uses: peter-evans/create-pull-request@4e1beaa7521e8b457b572c090b25bd3db56bf1c5  # v5.0.3
        with:
          title: 'Update to latest Kubernetes dependencies'
          commit-message: Update to latest Kubernetes dependencies
          committer: github-actions <actions@github.com>
          author: github-actions <actions@github.com>
          branch: dependencies/update
          base: main
          delete-branch: true
          labels: ok-to-test
          body: |
            Updating go.mod with latest Kubernetes related dependencies...
